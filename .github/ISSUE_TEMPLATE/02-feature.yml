name: Feature Request
description: Propose a new capability for Relay
title: ""
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem or use case is driving this request?
      placeholder: A clear description of the need behind this request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      placeholder: Describe the feature you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: Describe any alternatives or workarounds you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: Mockups, examples, screenshots, or related links.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues first.
          required: true
